<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand IMU Visualiser — ThesisA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <svg class="logo" viewBox="0 0 32 32" fill="none" aria-label="Hand Visualiser">
        <rect x="13" y="2" width="4" height="16" rx="2" fill="currentColor" opacity="0.9"/>
        <rect x="7" y="6" width="4" height="14" rx="2" fill="currentColor" opacity="0.7"/>
        <rect x="19" y="5" width="4" height="15" rx="2" fill="currentColor" opacity="0.7"/>
        <rect x="1" y="10" width="4" height="10" rx="2" fill="currentColor" opacity="0.5"/>
        <rect x="25" y="8" width="4" height="12" rx="2" fill="currentColor" opacity="0.5"/>
        <path d="M3 20 Q5 28 13 28 L19 28 Q27 28 29 20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <div>
        <h1 class="app-title">Hand IMU Visualiser</h1>
        <p class="app-sub">ThesisA · MPU6050 Quaternion Pose</p>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="toggleSettings" title="Link lengths & settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <div class="app-body">
    <!-- Settings Panel -->
    <aside class="settings-panel" id="settingsPanel">
      <div class="panel-header">
        <span class="panel-title">Link Lengths (mm)</span>
        <button class="btn-text" id="resetLengths">Reset</button>
      </div>
      <div class="panel-scroll">
        <div class="segment-group">
          <div class="segment-label">Palm</div>
          <div class="link-row"><label>Width</label><input type="number" id="ll_palm_width" value="85" min="30" max="150" step="1"/></div>
          <div class="link-row"><label>Length</label><input type="number" id="ll_palm_length" value="95" min="30" max="150" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Thumb</div>
          <div class="link-row"><label>Proximal</label><input type="number" id="ll_thumb_prox" value="38" min="10" max="80" step="1"/></div>
          <div class="link-row"><label>Distal</label><input type="number" id="ll_thumb_mid" value="28" min="10" max="80" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Index</div>
          <div class="link-row"><label>Proximal</label><input type="number" id="ll_index_prox" value="43" min="10" max="80" step="1"/></div>
          <div class="link-row"><label>Distal</label><input type="number" id="ll_index_mid" value="25" min="10" max="80" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Middle</div>
          <div class="link-row"><label>Proximal</label><input type="number" id="ll_middle_prox" value="48" min="10" max="80" step="1"/></div>
          <div class="link-row"><label>Distal</label><input type="number" id="ll_middle_mid" value="28" min="10" max="80" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Ring</div>
          <div class="link-row"><label>Proximal</label><input type="number" id="ll_ring_prox" value="45" min="10" max="80" step="1"/></div>
          <div class="link-row"><label>Distal</label><input type="number" id="ll_ring_mid" value="27" min="10" max="80" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Pinky</div>
          <div class="link-row"><label>Proximal</label><input type="number" id="ll_pinky_prox" value="35" min="10" max="80" step="1"/></div>
          <div class="link-row"><label>Distal</label><input type="number" id="ll_pinky_mid" value="22" min="10" max="80" step="1"/></div>
        </div>
        <div class="segment-group">
          <div class="segment-label">Wrist</div>
          <div class="link-row"><label>Length</label><input type="number" id="ll_wrist" value="55" min="20" max="100" step="1"/></div>
        </div>

        <div class="divider"></div>

        <div class="segment-group">
          <div class="segment-label">Display</div>
          <div class="link-row toggle-row">
            <label>Show axes</label>
            <label class="toggle"><input type="checkbox" id="showAxes" /><span class="slider"></span></label>
          </div>
          <div class="link-row toggle-row">
            <label>Show IMU frames</label>
            <label class="toggle"><input type="checkbox" id="showImuFrames" checked/><span class="slider"></span></label>
          </div>
          <div class="link-row toggle-row">
            <label>Smooth interpolation</label>
            <label class="toggle"><input type="checkbox" id="smoothInterp" checked/><span class="slider"></span></label>
          </div>
        </div>

        <div class="segment-group">
          <div class="segment-label">Playback Speed</div>
          <div class="link-row">
            <label>Speed</label>
            <select id="playbackSpeed">
              <option value="0.25">0.25×</option>
              <option value="0.5">0.5×</option>
              <option value="1" selected>1×</option>
              <option value="2">2×</option>
              <option value="4">4×</option>
            </select>
          </div>
        </div>

        <div class="apply-row">
          <button class="btn-primary" id="applyLengths">Apply Lengths</button>
        </div>
      </div>
    </aside>

    <!-- 3D Viewport -->
    <main class="viewport-wrap">
      <!-- Drop zone -->
      <div class="drop-overlay" id="dropOverlay">
        <div class="drop-card">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/>
          </svg>
          <p class="drop-title">Load Gesture CSV</p>
          <p class="drop-sub">Drag &amp; drop a <code>glove_data_*.csv</code> file here,<br/>or click to browse</p>
          <button class="btn-primary" id="browseBtn">Browse File</button>
          <input type="file" id="fileInput" accept=".csv" hidden />
        </div>
      </div>

      <!-- Canvas (hidden until data loaded) -->
      <canvas id="threeCanvas"></canvas>

      <!-- HUD overlays -->
      <div class="hud hud-tl" id="hudTL">
        <span class="hud-label" id="gestureName">—</span>
        <span class="hud-sub" id="frameInfo">—</span>
      </div>
      <div class="hud hud-tr">
        <span class="hud-sub">Orbit: drag · Zoom: scroll · Pan: right-drag</span>
      </div>

      <!-- Playback bar -->
      <div class="playbar" id="playbar" style="display:none">
        <button class="play-btn" id="playBtn" title="Play/Pause">
          <svg id="iconPlay" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <div class="scrubber-wrap">
          <input type="range" class="scrubber" id="scrubber" min="0" max="100" value="0" step="1" />
          <div class="scrubber-time">
            <span id="timeNow">0.00s</span>
            <span id="timeTot">0.00s</span>
          </div>
        </div>
        <button class="btn-icon" id="resetCamBtn" title="Reset camera">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="visualiser.js"></script>
</body>
</html>
